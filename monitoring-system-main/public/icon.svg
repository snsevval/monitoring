<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #1a1a2e; }
      .satellite { fill: #16213e; }
      .panel { fill: #0f3460; }
      .orbit { stroke: #4a5568; }
      .earth { fill: #22c55e; }
      .glow { fill: #3b82f6; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0f1419; }
      .satellite { fill: #2d3748; }
      .panel { fill: #4a5568; }
      .orbit { stroke: #718096; }
      .earth { fill: #38a169; }
      .glow { fill: #60a5fa; }
    }
  </style>
  <g clip-path="url(#clip0)">
    <rect class="background" width="180" height="180" rx="32" />

    <!-- Orbit rings -->
    <circle cx="90" cy="90" r="65" fill="none" class="orbit" stroke-width="1" opacity="0.3"/>
    <circle cx="90" cy="90" r="75" fill="none" class="orbit" stroke-width="1" opacity="0.2"/>

    <!-- Earth -->
    <circle cx="90" cy="90" r="25" class="earth"/>
    <ellipse cx="85" cy="85" rx="8" ry="12" fill="#15803d" opacity="0.7"/>
    <ellipse cx="95" cy="95" rx="6" ry="10" fill="#15803d" opacity="0.7"/>

    <!-- Satellite body -->
    <rect x="140" y="45" width="16" height="12" rx="2" class="satellite"/>

    <!-- Solar panels -->
    <rect x="130" y="47" width="8" height="8" rx="1" class="panel"/>
    <rect x="158" y="47" width="8" height="8" rx="1" class="panel"/>

    <!-- Antenna -->
    <line x1="148" y1="45" x2="148" y2="35" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="148" cy="35" r="2" fill="#9ca3af"/>

    <!-- Signal waves -->
    <path d="M148 60 Q120 75 90 90" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="125" cy="70" r="1.5" class="glow" opacity="0.8"/>
    <circle cx="110" cy="78" r="1" class="glow" opacity="0.6"/>

    <!-- Small monitoring dots -->
    <circle cx="60" cy="60" r="2" class="glow" opacity="0.4"/>
    <circle cx="120" cy="120" r="2" class="glow" opacity="0.4"/>
    <circle cx="45" cy="135" r="1.5" class="glow" opacity="0.3"/>
  </g>
  <defs>
    <clipPath id="clip0">
      <rect width="180" height="180" fill="white" rx="32"/>
    </clipPath>
  </defs>
</svg>